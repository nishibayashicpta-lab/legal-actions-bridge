openapi: 3.1.0
info:
  title: Legal Actions Bridge for ChatGPT
  version: 1.0.0
  description: >-
    tax-law-mcp, hourei-mcp-server, labor-law-mcp の主要機能を ChatGPT Actions から使うための橋渡しAPI。
servers:
  - url: https://YOUR-VERCEL-URL.vercel.app
paths:
  /api/tax/get-law:
    get:
      operationId: tax_get_law
      summary: 税法の条文を取得
      parameters:
        - in: query
          name: law_name
          required: true
          schema: { type: string }
        - in: query
          name: article
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
  /api/tax/search-law:
    get:
      operationId: tax_search_law
      summary: 税法を検索
      parameters:
        - in: query
          name: keyword
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /api/tax/get-tsutatsu:
    get:
      operationId: tax_get_tsutatsu
      summary: 税務通達を取得
      parameters:
        - in: query
          name: tsutatsu_name
          required: true
          schema: { type: string }
        - in: query
          name: number
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /api/tax/list-tsutatsu:
    get:
      operationId: tax_list_tsutatsu
      summary: 対応通達の一覧を取得
      responses:
        '200': { description: OK }
  /api/tax/list-saiketsu:
    get:
      operationId: tax_list_saiketsu
      summary: 税目別の裁決事例一覧を取得
      parameters:
        - in: query
          name: tax_type
          required: false
          schema: { type: string }
      responses:
        '200': { description: OK }
  /api/tax/search-saiketsu:
    get:
      operationId: tax_search_saiketsu
      summary: 裁決事例を検索
      parameters:
        - in: query
          name: keyword
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /api/tax/get-saiketsu:
    get:
      operationId: tax_get_saiketsu
      summary: 裁決事例本文を取得
      parameters:
        - in: query
          name: collection_no
          required: true
          schema: { type: integer }
        - in: query
          name: case_no
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
  /api/hourei/search-law:
    get:
      operationId: hourei_search_law
      summary: 法令名や法令番号で法令を検索
      parameters:
        - in: query
          name: keyword
          required: true
          schema: { type: string }
        - in: query
          name: category
          required: false
          schema:
            type: string
            enum: ['1', '2', '3', '4', '5']
      responses:
        '200': { description: OK }
  /api/hourei/get-law-data:
    get:
      operationId: hourei_get_law_data
      summary: 法令番号で法令本文XMLを取得
      parameters:
        - in: query
          name: lawNum
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /api/hourei/get-law-revision:
    get:
      operationId: hourei_get_law_revision
      summary: 法令番号で改正履歴XMLを取得
      parameters:
        - in: query
          name: lawNum
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /api/labor/search-law:
    get:
      operationId: labor_search_law
      summary: 労働・社会保険関連法令を検索
      parameters:
        - in: query
          name: keyword
          required: true
          schema: { type: string }
        - in: query
          name: law_type
          required: false
          schema:
            type: string
            enum: [Act, CabinetOrder, MinisterialOrdinance]
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 10 }
      responses:
        '200': { description: OK }
  /api/labor/get-law:
    get:
      operationId: labor_get_law
      summary: 労働・社会保険関連法令の条文を取得
      parameters:
        - in: query
          name: law_name
          required: true
          schema: { type: string }
        - in: query
          name: article
          required: false
          schema: { type: string }
        - in: query
          name: paragraph
          required: false
          schema: { type: integer }
        - in: query
          name: item
          required: false
          schema: { type: integer }
        - in: query
          name: format
          required: false
          schema:
            type: string
            enum: [markdown, toc]
      responses:
        '200': { description: OK }
  /api/labor/search-mhlw-tsutatsu:
    get:
      operationId: labor_search_mhlw_tsutatsu
      summary: 厚労省通達をキーワード検索
      parameters:
        - in: query
          name: keyword
          required: true
          schema: { type: string }
        - in: query
          name: page
          required: false
          schema: { type: integer, default: 0 }
      responses:
        '200': { description: OK }
  /api/labor/get-mhlw-tsutatsu:
    get:
      operationId: labor_get_mhlw_tsutatsu
      summary: 厚労省通達本文を取得
      parameters:
        - in: query
          name: data_id
          required: true
          schema: { type: string }
        - in: query
          name: page_no
          required: false
          schema: { type: integer, default: 1 }
      responses:
        '200': { description: OK }
  /api/labor/search-jaish-tsutatsu:
    get:
      operationId: labor_search_jaish_tsutatsu
      summary: JAISH安衛通達をキーワード検索
      parameters:
        - in: query
          name: keyword
          required: true
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 20 }
      responses:
        '200': { description: OK }
  /api/labor/get-jaish-tsutatsu:
    get:
      operationId: labor_get_jaish_tsutatsu
      summary: JAISH安衛通達本文を取得
      parameters:
        - in: query
          name: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
