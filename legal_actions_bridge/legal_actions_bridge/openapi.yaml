openapi: 3.1.0
info:
  title: Hourei + Labor Bridge for ChatGPT (Hobby-safe)
  version: 1.0.0
  description: >-
    hourei-mcp-server と labor-law-mcp の主要機能を、Vercel Hobby の関数数制限に収まる形で
    ChatGPT Actions から使うための橋渡しAPI。
servers:
  - url: https://YOUR-VERCEL-URL.vercel.app
paths:
  /api/hourei:
    get:
      operationId: hourei_action
      summary: 一般法令検索・法令本文XML取得・改正履歴XML取得
      parameters:
        - in: query
          name: action
          required: true
          schema:
            type: string
            enum: [search_law, get_law_data, get_law_revision]
        - in: query
          name: keyword
          required: false
          schema: { type: string }
        - in: query
          name: category
          required: false
          schema:
            type: string
            enum: ['1', '2', '3', '4', '5']
        - in: query
          name: lawNum
          required: false
          schema: { type: string }
      responses:
        '200':
          description: OK
  /api/labor:
    get:
      operationId: labor_action
      summary: 労働法令検索・条文取得・厚労省通達検索/取得・JAISH通達検索/取得
      parameters:
        - in: query
          name: action
          required: true
          schema:
            type: string
            enum:
              - search_law
              - get_law
              - search_mhlw_tsutatsu
              - get_mhlw_tsutatsu
              - search_jaish_tsutatsu
              - get_jaish_tsutatsu
        - in: query
          name: keyword
          required: false
          schema: { type: string }
        - in: query
          name: law_type
          required: false
          schema:
            type: string
            enum: [Act, CabinetOrder, MinisterialOrdinance]
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 10 }
        - in: query
          name: law_name
          required: false
          schema: { type: string }
        - in: query
          name: article
          required: false
          schema: { type: string }
        - in: query
          name: paragraph
          required: false
          schema: { type: integer }
        - in: query
          name: item
          required: false
          schema: { type: integer }
        - in: query
          name: format
          required: false
          schema:
            type: string
            enum: [markdown, toc]
        - in: query
          name: page
          required: false
          schema: { type: integer, default: 0 }
        - in: query
          name: data_id
          required: false
          schema: { type: string }
        - in: query
          name: page_no
          required: false
          schema: { type: integer, default: 1 }
        - in: query
          name: path
          required: false
          schema: { type: string }
      responses:
        '200':
          description: OK
